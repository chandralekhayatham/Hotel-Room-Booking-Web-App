<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
          th:href="@{/css/login.css}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow-lg mt-5">

                <div class="card-body">

                    <h2 class="text-center mb-4">

                        Hotel Login

                    </h2>

                    <form action="/login"
                          method="post">

                        <div class="mb-3">

                            <label>Email</label>

                            <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    required>

                        </div>

                        <div class="mb-3">

                            <label>Password</label>

                            <input
                                    type="password"
                                    name="password"
                                    class="form-control"
                                    required>

                        </div>

                        <div class="d-grid">

                            <button
                                    class="btn btn-primary">

                                Login

                            </button>

                        </div>

                    </form>

                    <div class="text-center mt-3">

                        <a href="/register">

                            Don't have an account?

                            Register

                        </a>

                    </div>

                    <div class="text-danger text-center mt-3"
                         th:text="${error}">

                    </div>

                    <div class="text-success text-center mt-3"
                         th:text="${success}">

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
