<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Book Room</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/booking.css}">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand"
           href="/">

            🏨 Hotel Booking

        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow-lg">

                <div class="card-body">

                    <h2 class="text-center mb-4">

                        Book Your Room

                    </h2>

                    <form action="/book"
                          method="post">

                        <input type="hidden"
                               name="roomId"
                               th:value="${param.roomId}">

                        <div class="mb-3">

                            <label>Email</label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Check-In Date</label>

                            <input
                                type="date"
                                id="checkIn"
                                name="checkIn"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Check-Out Date</label>

                            <input
                                type="date"
                                id="checkOut"
                                name="checkOut"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Guests</label>

                            <input
                                type="number"
                                name="guests"
                                min="1"
                                class="form-control"
                                required>

                        </div>

                        <div class="mb-3">

                            <label>Total Nights</label>

                            <input
                                type="text"
                                id="nights"
                                class="form-control"
                                readonly>

                        </div>

                        <div class="text-danger text-center mb-3"
                             th:text="${error}">
                        </div>

                        <div class="d-grid">

                            <button
                                class="btn btn-primary">

                                Confirm Booking

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const checkIn = document.getElementById("checkIn");
const checkOut = document.getElementById("checkOut");
const nights = document.getElementById("nights");

function calculateNights(){

    if(checkIn.value && checkOut.value){

        let inDate = new Date(checkIn.value);
        let outDate = new Date(checkOut.value);

        let diff =
        (outDate - inDate) /
        (1000*60*60*24);

        nights.value =
        diff > 0 ? diff + " Night(s)" : "";

    }

}

checkIn.addEventListener("change",calculateNights);
checkOut.addEventListener("change",calculateNights);

</script>

</body>

</html>
