<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/admin.css}">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand">

            🏨 Hotel Booking Admin

        </a>

        <a href="/"
           class="btn btn-warning">

            Logout

        </a>

    </div>

</nav>

<div class="container mt-4">

    <h2 class="mb-4">

        Dashboard

    </h2>

    <div class="row">

        <div class="col-md-3">

            <div class="card bg-primary text-white shadow">

                <div class="card-body">

                    <h5>Total Bookings</h5>

                    <h2 th:text="${totalBookings}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-success text-white shadow">

                <div class="card-body">

                    <h5>Active Bookings</h5>

                    <h2 th:text="${activeBookings}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-info text-white shadow">

                <div class="card-body">

                    <h5>Checked In</h5>

                    <h2 th:text="${checkedIn}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-danger text-white shadow">

                <div class="card-body">

                    <h5>Cancelled</h5>

                    <h2 th:text="${cancelled}"></h2>

                </div>

            </div>

        </div>

    </div>

    <hr class="my-5">

    <h3>

        Room Management

    </h3>

    <table class="table table-striped table-hover">

        <thead class="table-dark">

        <tr>

            <th>Room</th>

            <th>Type</th>

            <th>Price</th>

            <th>Guests</th>

            <th>Status</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="room : ${rooms}">

            <td th:text="${room.roomNumber}"></td>

            <td th:text="${room.roomType}"></td>

            <td>
                ₹<span th:text="${room.pricePerNight}"></span>
            </td>

            <td th:text="${room.maxGuests}"></td>

            <td>

                <span class="badge bg-success"
                      th:if="${room.available}">

                    Available

                </span>

                <span class="badge bg-danger"
                      th:unless="${room.available}">

                    Booked

                </span>

            </td>

        </tr>

        </tbody>

    </table>

    <hr class="my-5">

    <h3>

        Booking Details

    </h3>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>Booking ID</th>

            <th>Room</th>

            <th>Customer</th>

            <th>Check-In</th>

            <th>Check-Out</th>

            <th>Status</th>

            <th>Total</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="booking : ${bookings}">

            <td th:text="${booking.bookingId}"></td>

            <td th:text="${booking.room.roomNumber}"></td>

            <td th:text="${booking.user.fullName}"></td>

            <td th:text="${booking.checkInDate}"></td>

            <td th:text="${booking.checkOutDate}"></td>

            <td>

                <span class="badge bg-primary"
                      th:text="${booking.status}">
                </span>

            </td>

            <td>

                ₹<span th:text="${booking.totalAmount}"></span>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
