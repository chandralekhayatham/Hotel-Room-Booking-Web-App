<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Booking Successful</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/booking-success.css}">

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow-lg">

                <div class="card-body text-center">

                    <div class="success-icon">

                        ✅

                    </div>

                    <h2 class="text-success">

                        Booking Confirmed!

                    </h2>

                    <p class="text-muted">

                        Your room has been booked successfully.

                    </p>

                    <hr>

                    <table class="table table-bordered">

                        <tr>
                            <th>Booking ID</th>
                            <td th:text="${booking.bookingId}"></td>
                        </tr>

                        <tr>
                            <th>Room Number</th>
                            <td th:text="${booking.room.roomNumber}"></td>
                        </tr>

                        <tr>
                            <th>Room Type</th>
                            <td th:text="${booking.room.roomType}"></td>
                        </tr>

                        <tr>
                            <th>Check-In</th>
                            <td th:text="${booking.checkInDate}"></td>
                        </tr>

                        <tr>
                            <th>Check-Out</th>
                            <td th:text="${booking.checkOutDate}"></td>
                        </tr>

                        <tr>
                            <th>Guests</th>
                            <td th:text="${booking.guests}"></td>
                        </tr>

                        <tr>
                            <th>Total Amount</th>
                            <td>
                                ₹<span th:text="${booking.totalAmount}"></span>
                            </td>
                        </tr>

                        <tr>
                            <th>Status</th>
                            <td>
                                <span class="badge bg-success"
                                      th:text="${booking.status}">
                                </span>
                            </td>
                        </tr>

                    </table>

                    <div class="mt-4">

                        <a href="/rooms"
                           class="btn btn-primary me-2">

                            Book Another Room

                        </a>

                        <a href="/"
                           class="btn btn-success">

                            Home

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
